<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Inner shadow top -->
  <rect width="32" height="16" rx="7" fill="url(#shine)"/>

  <!-- F lettermark — bold geometric -->
  <!-- Vertical stem -->
  <rect x="8" y="7" width="4.5" height="18" rx="1.2" fill="white"/>
  <!-- Top crossbar -->
  <rect x="8" y="7" width="14.5" height="4.5" rx="1.2" fill="white"/>
  <!-- Mid crossbar -->
  <rect x="8" y="13.5" width="10" height="4" rx="1.2" fill="white"/>

  <!-- Sparkle accent — 4-point star top-right -->
  <g filter="url(#glow)" opacity="0.95">
    <path d="M25.5 4.5 L26.2 6.2 L28 6.9 L26.2 7.6 L25.5 9.3 L24.8 7.6 L23 6.9 L24.8 6.2 Z" fill="white"/>
  </g>

  <!-- Tiny dot accent -->
  <circle cx="25.5" cy="22" r="1.2" fill="white" opacity="0.5"/>
</svg>
