<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Rich multi-stop gradient background -->
    <radialGradient id="bg-radial" cx="30%" cy="25%" r="80%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="45%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f1d96"/>
    </radialGradient>
    <linearGradient id="bg-tint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="70%"  stop-color="#c026d3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.75"/>
    </linearGradient>
    <!-- Top glass shine -->
    <linearGradient id="shine" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Inner shadow at bottom for depth -->
    <linearGradient id="depth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
    <clipPath id="round-clip">
      <rect width="32" height="32" rx="7.5"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round-clip)">
    <!-- Base gradient -->
    <rect width="32" height="32" fill="url(#bg-radial)"/>
    <!-- Pink/fuchsia tint overlay -->
    <rect width="32" height="32" fill="url(#bg-tint)"/>
    <!-- Glass shine -->
    <rect width="32" height="32" fill="url(#shine)"/>
    <!-- Bottom depth shadow -->
    <rect width="32" height="32" fill="url(#depth)"/>

    <!-- ── F lettermark ──────────────────────────────────────────────
         Typographic proportions: wider stem, proper bar ratios,
         slight optical weight — drawn as paths not rectangles.
    ──────────────────────────────────────────────────────────────── -->

    <!-- Shadow layer (depth illusion) -->
    <g opacity="0.20" transform="translate(0.8, 1)">
      <rect x="8"  y="7"    width="5.2" height="18.5" rx="1.4" fill="#1e1b4b"/>
      <rect x="8"  y="7"    width="15"  height="5"    rx="1.4" fill="#1e1b4b"/>
      <rect x="8"  y="13.8" width="10.5" height="4.2" rx="1.4" fill="#1e1b4b"/>
    </g>

    <!-- Main F — white with subtle warm tint -->
    <g>
      <!-- Vertical stem — slightly wider for presence -->
      <rect x="8"  y="7"    width="5.2" height="18.5" rx="1.4" fill="white"/>
      <!-- Top crossbar — full width, generous -->
      <rect x="8"  y="7"    width="15"  height="5"    rx="1.4" fill="white"/>
      <!-- Mid crossbar — golden ratio height, 70% of top width -->
      <rect x="8"  y="13.8" width="10.5" height="4.2" rx="1.4" fill="white"/>
    </g>

    <!-- ── Accent: subtle type ornament ─────────────────────────── -->
    <!-- A refined 4-pointed diamond (smaller, more elegant) -->
    <path
      d="M25.2 21.5 L26 23.5 L27.8 24.3 L26 25.1 L25.2 27.1 L24.4 25.1 L22.6 24.3 L24.4 23.5 Z"
      fill="white" opacity="0.55"
    />
    <!-- Two tiny dots — type specimen feel -->
    <circle cx="25.2" cy="10"  r="1"   fill="white" opacity="0.5"/>
    <circle cx="27.5" cy="12.5" r="0.6" fill="white" opacity="0.35"/>
  </g>
</svg>
