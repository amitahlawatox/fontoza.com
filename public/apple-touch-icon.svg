<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg-radial" cx="30%" cy="25%" r="80%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="45%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f1d96"/>
    </radialGradient>
    <linearGradient id="bg-tint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="70%"  stop-color="#c026d3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="shine" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="depth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#5b21b6" flood-opacity="0.4"/>
    </filter>
    <clipPath id="round-clip">
      <rect width="180" height="180" rx="42"/>
    </clipPath>
  </defs>

  <g filter="url(#drop)">
    <g clip-path="url(#round-clip)">
      <!-- Layered background -->
      <rect width="180" height="180" fill="url(#bg-radial)"/>
      <rect width="180" height="180" fill="url(#bg-tint)"/>
      <rect width="180" height="180" fill="url(#shine)"/>
      <rect width="180" height="180" fill="url(#depth)"/>

      <!-- Shadow layer (depth illusion) -->
      <g opacity="0.20" transform="translate(4.5, 5.6)">
        <rect x="44"  y="39"   width="29.5" height="104" rx="8" fill="#1e1b4b"/>
        <rect x="44"  y="39"   width="85"   height="28"  rx="8" fill="#1e1b4b"/>
        <rect x="44"  y="78"   width="59.5" height="24"  rx="8" fill="#1e1b4b"/>
      </g>

      <!-- Main F lettermark -->
      <rect x="44"  y="39"  width="29.5" height="104" rx="8" fill="white"/>
      <rect x="44"  y="39"  width="85"   height="28"  rx="8" fill="white"/>
      <rect x="44"  y="78"  width="59.5" height="24"  rx="8" fill="white"/>

      <!-- Accent: 4-pointed diamond -->
      <g filter="url(#glow)">
        <path
          d="M143 121 L147 131 L157 135 L147 139 L143 149 L139 139 L129 135 L139 131 Z"
          fill="white" opacity="0.60"
        />
      </g>

      <!-- Two tiny dots -->
      <circle cx="143" cy="56"  r="5.5"  fill="white" opacity="0.50"/>
      <circle cx="155" cy="70"  r="3.4"  fill="white" opacity="0.35"/>
    </g>
  </g>
</svg>
